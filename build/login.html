<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>

  <meta charset="UTF-8">
  <title>Login — JalRakshak</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="css/login.css" rel="stylesheet">
</head>
<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar">
  <a href="index.html" class="brand">
    <i class="fa-solid fa-droplet brand-icon"></i>
    JalRakshak
  </a>
</nav>

<!-- ================= MAIN ================= -->
<div class="container">

  <!-- LOGIN -->
  <div class="card">
    <h2>Login</h2>

    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">

    <button id="loginBtn">Login</button>

    <p class="redirect-text">
      New here? <a href="signup.html">Sign Up</a>
    </p>
  </div>

</div>

<!-- ================= SCRIPT ================= -->
<script>
  const SUPABASE_URL = "https://ckhloxjldjmexelcjwqx.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNraGxveGpsZGptZXhlbGNqd3F4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NTA0NzcsImV4cCI6MjA4OTMyNjQ3N30.awjhebQyvbdkitEK7pyfNc5sUxzY_th6YN_kDDU_exY";

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const loginBtn = document.getElementById("loginBtn");

  loginBtn.addEventListener("click", async () => {
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;

    const { data: user, error } = await client
      .from("users")
      .select("*")
      .eq("email", email)
      .eq("password", password);

    if (error) {
      alert("Error connecting to database");
      return;
    }

    if (user && user.length > 0) {
      window.location.href = "admin.html";
    } else {
      alert("Invalid email or password");
    }
  });
</script>

</body>
</html>
