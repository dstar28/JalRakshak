<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel — JalRakshak</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>

  <!-- Custom CSS -->
  <link href="css/admin.css" rel="stylesheet"/>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar">
  <a class="navbar-brand" href="index.html">
    <i class="fa-solid fa-droplet brand-icon"></i>
    JalRakshak
  </a>

  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="patient.html">Patient</a>
  </div>
</nav>


<!-- ================= PAGE HEADER ================= -->
<section class="page-header">
  <h1>
    <i class="fa-solid fa-user-shield section-icon"></i>
    Health Worker Panel
  </h1>
  <p>Enter daily case data and generate AI-based outbreak predictions</p>
</section>


<!-- ================= MAIN CONTENT ================= -->
<div class="main-content">
  <div class="row g-4">


    <!-- ================= DATA ENTRY FORM ================= -->
    <div class="col-lg-5">
      <div class="card">

        <div class="card-header-custom">
          <i class="fa-solid fa-clipboard-list section-icon"></i>
          Add Daily Case Report
        </div>

        <div class="card-body-custom">

          <!-- Village -->
          <div class="mb-3">
            <label class="form-label">Village Name</label>
            <select class="form-select" id="villageName">
              <option value="">Select village...</option>
              <option>Majuli</option>
              <option>Dhemaji</option>
              <option>Pasighat</option>
              <option>Ziro</option>
              <option>ShillongRural</option>
              <option>Tura</option>
              <option>Lunglei</option>
              <option>Champhai</option>
            </select>
          </div>

          <!-- Date -->
          <div class="mb-3">
            <label class="form-label">Date</label>
            <input type="date" class="form-control" id="reportDate"/>
          </div>


          <!-- Cases -->
          <div class="row g-2 mb-3">

            <div class="col-6">
              <label class="form-label">Diarrhea Cases</label>
              <input type="number" class="form-control" id="diarrhea" min="0"/>
            </div>

            <div class="col-6">
              <label class="form-label">Cholera Cases</label>
              <input type="number" class="form-control" id="cholera" min="0"/>
            </div>

          </div>


          <div class="row g-2 mb-3">

            <div class="col-6">
              <label class="form-label">Typhoid Cases</label>
              <input type="number" class="form-control" id="typhoid" min="0"/>
            </div>

            <div class="col-6">
              <label class="form-label">Rainfall (mm)</label>
              <input type="number" class="form-control" id="rainfall" min="0"/>
            </div>

          </div>


          <!-- Hidden ML fields -->
          <input type="hidden" id="population" value="12000">
          <input type="hidden" id="month">
          <input type="hidden" id="year">


          <!-- Predict button -->
          <button class="btn-predict" id="predictBtn">
            <i class="fa-solid fa-brain"></i>
            Generate Outbreak Prediction
          </button>


          <!-- Prediction Result -->
          <div class="prediction-result" id="predictionResult"></div>

        </div>
      </div>
    </div>



    <!-- ================= HISTORY TABLE ================= -->
    <div class="col-lg-7">
      <div class="card">

        <div class="card-header-custom">
          <i class="fa-solid fa-table section-icon"></i>
          Historical Case Data
        </div>

        <div style="overflow-x:auto;">
          <table class="data-table">

            <thead>
              <tr>
                <th>Date</th>
                <th>Village</th>
                <th>Diarrhea</th>
                <th>Cholera</th>
                <th>Typhoid</th>
                <th>Rainfall</th>
                <th>Risk</th>
              </tr>
            </thead>

            <tbody id="historyTableBody">
            </tbody>

          </table>
        </div>

      </div>
    </div>


  </div>
</div>



<!-- ================= SCRIPTS ================= -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/data.js"></script>

<script src="js/admin.js"></script>

</body>
</html>
